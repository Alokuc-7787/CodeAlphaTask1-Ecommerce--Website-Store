<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aarohimart QR</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Arial, sans-serif;
        background: radial-gradient(circle at top, #fff6dd, #edf6ff 48%, #082a48 100%);
        color: #082a48;
      }
      .card {
        width: min(420px, 100%);
        padding: 28px;
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.94);
        text-align: center;
        box-shadow: 0 24px 70px rgba(8, 42, 72, 0.24);
      }
      h1 { margin: 0 0 8px; font-size: 2rem; }
      p { margin: 0 0 20px; color: #55708b; }
      img {
        width: min(280px, 100%);
        border-radius: 22px;
        background: #fffaf1;
        box-shadow: 0 14px 34px rgba(8, 42, 72, 0.16);
      }
      a {
        display: inline-block;
        margin-top: 18px;
        padding: 12px 18px;
        border-radius: 999px;
        background: #082a48;
        color: white;
        text-decoration: none;
        font-weight: 800;
      }
      small { display: block; margin-top: 14px; color: #6f8092; }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Aarohimart</h1>
      <p>Scan karo aur store open karo</p>
      <img src="/aarohimart-qr.svg" alt="Aarohimart website QR code" />
      <a href="https://alokucmart.store">Open Website</a>
      <small>https://alokucmart.store</small>
    </main>
  </body>
</html>
